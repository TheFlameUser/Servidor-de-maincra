# RankPlugin Configuration

settings:
  # The default rank assigned to players if no other rank is specified.
  default_rank: default

discord:
  # Enable or disable Discord integration.
  enabled: false
  # Automatically sync Minecraft ranks to Discord roles.
  auto_sync: false
  # Your Discord bot token. Get this from Discord Developer Portal.
  token: YOUR_DISCORD_BOT_TOKEN_HERE
  # The ID of your Discord Guild (Server).
  guild_id: YOUR_DISCORD_GUILD_ID_HERE
  # The ID of the Discord text channel where plugin logs will be sent.
  log_channel_id: YOUR_DISCORD_LOG_CHANNEL_ID_HERE
  # Mapping of Minecraft ranks to Discord Role IDs.
  # Replace 'YOUR_DISCORD_ROLE_ID_HERE' with actual role IDs.
  role_mappings:
    default: YOUR_DISCORD_ROLE_ID_FOR_DEFAULT_RANK
    vip: YOUR_DISCORD_ROLE_ID_FOR_VIP_RANK
    pro: YOUR_DISCORD_ROLE_ID_FOR_PRO_RANK
    mvp: YOUR_DISCORD_ROLE_ID_FOR_MVP_RANK
    builder: YOUR_DISCORD_ROLE_ID_FOR_BUILDER_RANK
    legend: YOUR_DISCORD_ROLE_ID_FOR_LEGEND_RANK
    admin: YOUR_DISCORD_ROLE_ID_FOR_ADMIN_RANK
    owner: YOUR_DISCORD_ROLE_ID_FOR_OWNER_RANK
    ban: YOUR_DISCORD_ROLE_ID_FOR_BAN_RANK

economy:
  # Amount of money given to 'pro' rank players every 2 days.
  pro_rank_money_amount: 1000.0
  # Amount of money given to 'mvp' rank players every 2 days.
  mvp_rank_money_amount: 7000.0
  # Amount of money given to 'builder' rank players every 2 days.
  builder_rank_money_amount: 8000.0
  # Amount of money given to 'legend' rank players every 2 days.
  legend_rank_money_amount: 15000.0

# Define your ranks here. The key is the rank name (lowercase).
# prefix: The chat prefix for the rank (supports Minecraft color codes like &a, &b, etc., and hex colors like &#RRGGBB and <#RRGGBB>text<#RRGGBB> for gradients).
# discord_role_id: The Discord Role ID associated with this Minecraft rank. Used for syncing.
# temp_duration_minutes: Default duration in minutes for temporary ranks if not specified in command.
ranks:
  ban:
    prefix: '&l&4Banned ' # Removed brackets, added bold
    discord_role_id: YOUR_DISCORD_ROLE_ID_FOR_BAN_RANK
    temp_duration_minutes: 0
  default:
    prefix: '&l&7Member ' # Removed brackets, added bold
    discord_role_id: YOUR_DISCORD_ROLE_ID_FOR_DEFAULT_RANK
    temp_duration_minutes: 0
  vip:
    prefix: '&l&aVIP ' # Removed brackets, added bold
    discord_role_id: YOUR_DISCORD_ROLE_ID_FOR_VIP_RANK
    temp_duration_minutes: 0
  pro:
    prefix: '&l&bPro ' # Removed brackets, added bold
    discord_role_id: YOUR_DISCORD_ROLE_ID_FOR_PRO_RANK
    temp_duration_minutes: 0
  mvp:
    prefix: '&l&dMVP ' # Removed brackets, added bold
    discord_role_id: YOUR_DISCORD_ROLE_ID_FOR_MVP_RANK
    temp_duration_minutes: 0
  builder:
    prefix: '&l&eBuilder ' # Removed brackets, added bold
    discord_role_id: YOUR_DISCORD_ROLE_ID_FOR_BUILDER_RANK
    temp_duration_minutes: 0
  legend:
    prefix: '&l&6Legend ' # Removed brackets, added bold
    discord_role_id: YOUR_DISCORD_ROLE_ID_FOR_LEGEND_RANK
    temp_duration_minutes: 0
  admin:
    prefix: '&l&cAdmin ' # Removed brackets, added bold
    discord_role_id: YOUR_DISCORD_ROLE_ID_FOR_ADMIN_RANK
    temp_duration_minutes: 0
  owner:
    prefix: '&l&5Owner ' # Removed brackets, added bold
    discord_role_id: YOUR_DISCORD_ROLE_ID_FOR_OWNER_RANK
    temp_duration_minutes: 0

# The order of ranks for promotion/demotion commands.
# Ensure all ranks defined above are listed here in your desired hierarchy.
rank_order:
- default
- vip
- pro
- mvp
- builder
- legend
- admin
- owner
- ban

